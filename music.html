<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta content="IE=edge" http-equiv="X-UA-Compatible">
  <meta content="width=device-width,initial-scale=1" name="viewport">
  <meta content="The SkyVerse — alternative electronic music project by Sarat and Pankaj" name="description">
  <meta name="google" content="notranslate" />
  <meta content="Sarat Chandra" name="author">

  <!-- Disable tap highlight on IE -->
  <meta name="msapplication-tap-highlight" content="no">

  <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon-16x16.png">

  <title>The Skyverse</title>

  <link href="./main.3f6952e4.css" rel="stylesheet">
  <link href="./dark-theme.css?v=2" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans', sans-serif;
      color: #333;
      padding-top: 70px;
    }

    .navbar {
      background-color: #f8f8f8;
      border-bottom: 1px solid #ddd;
    }

    .navbar-nav>li>a {
      color: #333 !important;
    }

    .navbar-nav>li>a:hover,
    .navbar-nav>li>a:focus {
      background-color: #e7e7e7 !important;
    }

    .section-container {
      padding: 40px 0;
    }

    .text-center h1 {
      margin-bottom: 20px;
      font-family: 'Letter Gothic', monospace;
      color: #000;
    }

    .text-center h1.large {
      font-size: xx-large;
    }

    .text-center h1.medium {
      font-size: larger;
    }

    .text-center h1.small {
      font-size: large;
      color: var(--accent-teal, #2a9d8f);
    }

    .carousel-control.left,
    .carousel-control.right {
      background-image: none;
      color: white;
      font-size: 24px;
      top: 50%;
      transform: translateY(-50%);
    }

    .carousel-control.left::before {
      content: '\2039';
    }

    .carousel-control.right::before {
      content: '\203A';
    }

    .carousel-inner img {
      margin: auto;
    }

    .carousel-control {
      width: 5%;
    }

    .card-container h4,
    .card-container h3 {
      margin: 10px 0;
    }

    .footer-container {
      background-color: #f8f8f8;
      padding: 20px 0;
      border-top: 1px solid #ddd;
    }

    .footer-container p {
      margin: 0;
      font-family: 'Letter Gothic', monospace;
      color: #0dbd07;
    }

    /* Light mode - invert colors for a white theme effect */
    .light-theme iframe[src*="spotify"] {
      filter: invert(1) hue-rotate(180deg);
    }

    /* Dark mode - use the default black theme */
    .dark-theme iframe[src*="spotify"] {
      filter: none;
    }
  </style>
</head>

<body>

      </div>
